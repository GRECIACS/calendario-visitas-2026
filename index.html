<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Calendario de Visitas 2026</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script><style>:root{--orange:#F26522;--orange-deep:#D6470E;--blue:#1B4B72;--black:#17110D;--paper:#FFF;--line:#E4DCD0;--bg:#F0EBE3}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Poppins,sans-serif;background:var(--bg)}#toolbar{position:sticky;top:0;z-index:100;background:#17110D;display:flex;align-items:center;gap:12px;padding:10px 20px;flex-wrap:wrap}#toolbar button{background:var(--orange);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}#toolbar button:hover{background:var(--orange-deep)}#toolbar .hint{color:#ccc;font-size:12px;flex:1;min-width:200px}.cal-page{width:100%;max-width:1080px;margin:32px auto;background:var(--paper);border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1);position:relative}.banner{background:linear-gradient(135deg,#17110D 0%,#D6470E 55%,#F9D9C8 100%);padding:40px 48px 32px;color:#fff;position:relative}.banner .label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.75;margin-bottom:8px}.banner h1{font-family:'Archivo Black',sans-serif;font-size:56px;line-height:1;display:flex;align-items:baseline;gap:16px}.banner h1 span{font-size:32px;opacity:.7}.download-month-btn{position:absolute;bottom:20px;right:40px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 12px;border-radius:4px;font-size:11px;cursor:pointer}.download-month-btn:hover{background:rgba(255,255,255,.4)}.grid-head{display:grid;grid-template-columns:repeat(7,1fr);background:#17110D}.grid-head div{text-align:center;padding:10px 4px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:#fff;text-transform:uppercase}.grid-body{display:grid;grid-template-columns:repeat(7,1fr)}.day-cell{min-height:155px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px;display:flex;flex-direction:column;gap:2px;position:relative}.day-cell:nth-child(7n){border-right:none}.day-cell.empty{background:#FAF7F4}.day-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--orange);font-weight:500;margin-bottom:2px}.cita-block{display:flex;flex-direction:column;border-top:1px dashed #EDE8E0;padding-top:2px;position:relative}.cita-block:first-of-type{border-top:none}.cita-num{font-family:'DM Mono',monospace;font-size:8px;color:#C4B4A4;line-height:1;margin-bottom:1px}.cita-titulo{color:var(--orange);font-weight:700;font-size:10px;line-height:1.2;outline:none;min-height:13px}.cita-titulo:empty:before{content:attr(data-ph);color:#D4C8BC;font-weight:400}.cita-info{color:var(--blue);font-size:9px;line-height:1.2;outline:none;min-height:11px}.cita-info:empty:before{content:attr(data-ph);color:#D4C8BC}.add-cita-btn{margin-top:3px;background:none;border:1px dashed #D4C8BC;border-radius:3px;color:#B8A898;font-size:9px;cursor:pointer;padding:2px 4px;width:100%;display:none}.day-cell:hover .add-cita-btn{display:block}.del-cita{position:absolute;top:2px;right:0;background:#EDE8E0;border:none;color:#A89888;font-size:11px;cursor:pointer;padding:0 4px;border-radius:3px;opacity:0}.cita-block:hover .del-cita{opacity:1}#alert-box{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#17110D;color:#fff;padding:12px 20px;border-radius:6px;font-size:14px;z-index:200}.is-exporting .add-cita-btn,.is-exporting .del-cita,.is-exporting .download-month-btn{display:none!important;visibility:hidden!important;opacity:0!important}.is-exporting .cita-titulo:empty:before,.is-exporting .cita-info:empty:before{content:''!important;display:none!important}@media print{@page{size:A4 landscape;margin:0}#toolbar,.add-cita-btn,.del-cita,.download-month-btn{display:none!important}body{background:#fff}.cal-page{margin:0;width:100vw;height:100vh;max-width:none;border-radius:0;box-shadow:none;page-break-after:always;display:flex;flex-direction:column}.banner{padding:20px 48px;flex-shrink:0}.banner h1{font-size:48px}.grid-body{flex:1}.day-cell{min-height:0;height:auto;flex:1}.day-num{font-size:12px}.cita-titulo{font-size:10px}.cita-info{font-size:9px}}</style></head><body><div id="toolbar"><button onclick="window.print()">Imprimir Todo (PDF)</button><button onclick="exportData()">Exportar Datos</button><button onclick="document.getElementById('importFile').click()">Importar Datos</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)"><span class="hint">Usa el botón en cada mes para descargar como imagen (sin guías de edición).</span></div><div id="alert-box"></div><script>const MONTHS=[{name:'JULIO',year:2026,month:6,days:31},{name:'AGOSTO',year:2026,month:7,days:31},{name:'SEPTIEMBRE',year:2026,month:8,days:30},{name:'OCTUBRE',year:2026,month:9,days:31},{name:'NOVIEMBRE',year:2026,month:10,days:30},{name:'DICIEMBRE',year:2026,month:11,days:31}];const DAYS=['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'];const DEF=3;const MAX=6;function showAlert(msg,dur=3000){const a=document.getElementById('alert-box');a.textContent=msg;a.style.display='block';setTimeout(()=>{a.style.display='none'},dur)}function sv(k,v){localStorage.setItem(k,v)}function ld(k){return localStorage.getItem(k)||''}function exportData(){const data={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('cv26_'))data[k]=localStorage.getItem(k)}const blob=new Blob([JSON.stringify(data)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='calendario-visitas-2026.json';a.click()}function importData(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=(e)=>{const data=JSON.parse(e.target.result);for(const k in data)localStorage.setItem(k,data[k]);location.reload()};reader.readAsText(file)}function downloadMonth(id,name){const el=document.getElementById(id);el.classList.add('is-exporting');setTimeout(()=>{html2canvas(el,{scale:2,useCORS:true,logging:false,backgroundColor:'#FFF'}).then(canvas=>{const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=`Calendario_${name}_2026.png`;a.click();el.classList.remove('is-exporting')})},500)}function makeCita(m,d,ci,cell){const b=document.createElement('div');b.className='cita-block';const kt=`cv26_${m}_${d}_c${ci}_t`;const ki=`cv26_${m}_${d}_c${ci}_i`;b.innerHTML=`<div class="cita-num">${ci}.</div><div class="cita-titulo" contenteditable="true" data-ph="Visita / Actividad">${ld(kt)}</div><div class="cita-info" contenteditable="true" data-ph="Hora | Direccion">${ld(ki)}</div><button class="del-cita">x</button>`;const t=b.querySelector('.cita-titulo');const inf=b.querySelector('.cita-info');t.oninput=()=>sv(kt,t.textContent);inf.oninput=()=>sv(ki,inf.textContent);b.querySelector('.del-cita').onclick=()=>{if(confirm('Eliminar?')){sv(kt,'');sv(ki,'');b.remove()}};return b}function buildMonth(cfg){const first=new Date(cfg.year,cfg.month,1).getDay();const page=document.createElement('div');page.className='cal-page';page.id='month-'+cfg.month;page.innerHTML=`<div class="banner"><div class="label">Calendario de Visitas</div><h1>${cfg.name} <span>${cfg.year}</span></h1><button class="download-month-btn" onclick="downloadMonth('month-${cfg.month}','${cfg.name}')">Descargar Imagen</button></div><div class="grid-head"></div><div class="grid-body"></div>`;const head=page.querySelector('.grid-head');DAYS.forEach(d=>{const div=document.createElement('div');div.textContent=d;head.appendChild(div)});const body=page.querySelector('.grid-body');for(let i=0;i<first;i++)body.innerHTML+='<div class="day-cell empty"></div>';for(let d=1;d<=cfg.days;d++){const cell=document.createElement('div');cell.className='day-cell';cell.innerHTML=`<div class="day-num">${d}</div>`;for(let c=1;c<=DEF;c++)cell.appendChild(makeCita(cfg.month,d,c,cell));const btn=document.createElement('button');btn.className='add-cita-btn';btn.textContent='+ Agregar';btn.onclick=()=>{const cur=cell.querySelectorAll('.cita-block').length;if(cur<MAX)cell.insertBefore(makeCita(cfg.month,d,cur+1,cell),btn)};cell.appendChild(btn);body.appendChild(cell)}document.body.appendChild(page)}MONTHS.forEach(buildMonth);</script></body></html>
