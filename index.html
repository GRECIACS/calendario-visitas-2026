<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario de Visitas 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --orange: #F26522;
      --orange-deep: #D6470E;
      --blue: #1B4B72;
      --black: #17110D;
      --paper: #FFF;
      --line: #E4DCD0;
      --bg: #F0EBE3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--black); }
    
    #toolbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--black);
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; flex-wrap: wrap;
    }
    #toolbar button {
      background: var(--orange); color: #fff; border: none; border-radius: 6px;
      padding: 8px 16px; font-weight: 700; font-size: 13px; cursor: pointer;
    }
    #toolbar button:hover { background: var(--orange-deep); }
    #toolbar .hint { color: #ccc; font-size: 12px; flex: 1; min-width: 200px; }

    .cal-page {
      width: 100%; max-width: 1080px; margin: 32px auto;
      background: var(--paper); border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.1); position: relative;
    }
    
    .banner {
      background: linear-gradient(135deg, var(--black) 0%, var(--orange-deep) 55%, #F9D9C8 100%);
      padding: 40px 48px 32px; color: #fff; position: relative;
    }
    .banner .label {
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 4px;
      text-transform: uppercase; opacity: .75; margin-bottom: 8px;
    }
    .banner h1 {
      font-family: 'Archivo Black', sans-serif; font-size: 56px; line-height: 1;
      display: flex; align-items: baseline; gap: 16px;
    }
    .banner h1 span { font-size: 32px; opacity: .7; }

    .calendar-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 32px; padding: 48px;
    }
    @media (max-width: 900px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .calendar-grid { grid-template-columns: 1fr; } }

    .month-box { background: #fff; }
    .month-name {
      font-family: 'Archivo Black', sans-serif; font-size: 18px; color: var(--orange);
      margin-bottom: 12px; text-transform: uppercase; border-bottom: 2px solid var(--line);
      padding-bottom: 4px;
    }
    .days-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .day-label {
      font-size: 10px; font-weight: 700; color: #999; text-align: center;
      padding-bottom: 4px;
    }
    .day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 13px; border-radius: 4px; color: #444;
    }
    .day.empty { visibility: hidden; }
    .day.today { background: var(--orange); color: #fff; font-weight: 700; }
    .day.weekend { color: var(--orange-deep); font-weight: 600; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button onclick="downloadCalendar()">Descargar Calendario (JPG)</button>
    <div class="hint">Calendario de Visitas para el año 2026.</div>
  </div>

  <div class="cal-page" id="capture-area">
    <div class="banner">
      <div class="label">Planificación Anual</div>
      <h1>2026 <span>Calendario</span></h1>
    </div>
    
    <div class="calendar-grid" id="calendar-container"></div>
  </div>

  <script>
    const months = [
      "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
      "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
    ];
    const daysLabels = ["D", "L", "M", "M", "J", "V", "S"];

    function generateCalendar() {
      const container = document.getElementById('calendar-container');
      const year = 2026;

      months.forEach((name, index) => {
        const monthDiv = document.createElement('div');
        monthDiv.className = 'month-box';
        
        const title = document.createElement('div');
        title.className = 'month-name';
        title.innerText = name;
        monthDiv.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'days-grid';

        daysLabels.forEach(d => {
          const label = document.createElement('div');
          label.className = 'day-label';
          label.innerText = d;
          grid.appendChild(label);
        });

        const firstDay = new Date(year, index, 1).getDay();
        const daysInMonth = new Date(year, index + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
          const empty = document.createElement('div');
          empty.className = 'day empty';
          grid.appendChild(empty);
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const day = document.createElement('div');
          const dateObj = new Date(year, index, d);
          const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
          
          day.className = 'day' + (isWeekend ? ' weekend' : '');
          day.innerText = d;
          grid.appendChild(day);
        }

        monthDiv.appendChild(grid);
        container.appendChild(monthDiv);
      });
    }

    async function downloadCalendar() {
      const element = document.getElementById('capture-area');
      const canvas = await html2canvas(element, { scale: 2 });
      const link = document.createElement('a');
      link.download = 'Calendario_Visitas_2026.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.9);
      link.click();
    }

    generateCalendar();
  </script>
</body>
</html>
