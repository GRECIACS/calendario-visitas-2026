<!DOCTYPE html><html lang=es><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1.0"><title>Calendario de Visitas — Julio a Diciembre 2026</title><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel=stylesheet><style>:root{--orange:#F26522;--orange-deep:#D6470E;--blue:#1B4B72;--black:#17110D;--paper:#FFF;--line:#E4DCD0;--bg:#F0EBE3}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Poppins,sans-serif;background:var(--bg)}#toolbar{position:sticky;top:0;z-index:100;background:#17110D;display:flex;align-items:center;gap:12px;padding:10px 20px;flex-wrap:wrap}#toolbar button{background:var(--orange);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-family:Poppins,sans-serif;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}#toolbar button:hover{background:var(--orange-deep)}#toolbar .hint{color:#ccc;font-size:12px;flex:1;min-width:200px}.cal-page{width:100%;max-width:1080px;margin:32px auto;background:var(--paper);border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1);page-break-after:always}.banner{background:linear-gradient(135deg,#17110D 0%,#D6470E 55%,#F9D9C8 100%);padding:40px 48px 32px;color:#fff}.banner .label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.75;margin-bottom:8px}.banner h1{font-family:'Archivo Black',sans-serif;font-size:56px;line-height:1;display:flex;align-items:baseline;gap:16px}.banner h1 span{font-size:32px;opacity:.7}.grid-head{display:grid;grid-template-columns:repeat(7,1fr);background:#17110D}.grid-head div{text-align:center;padding:10px 4px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:#fff;text-transform:uppercase}.grid-body{display:grid;grid-template-columns:repeat(7,1fr)}.day-cell{min-height:155px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px;display:flex;flex-direction:column;gap:2px;position:relative}.day-cell:nth-child(7n){border-right:none}.day-cell.empty{background:#FAF7F4}.day-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--orange);font-weight:500;margin-bottom:2px;flex-shrink:0}.cita-block{display:flex;flex-direction:column;border-top:1px dashed #EDE8E0;padding-top:2px;flex-shrink:0;position:relative}.cita-block:first-of-type{border-top:none;padding-top:0}.cita-num{font-family:'DM Mono',monospace;font-size:8px;color:#C4B4A4;line-height:1;margin-bottom:1px}.cita-titulo{color:var(--orange);font-weight:700;font-size:10px;line-height:1.2;font-family:Poppins,sans-serif;outline:none;min-height:13px}.cita-titulo:empty:before{content:attr(data-ph);color:#D4C8BC;font-weight:400;pointer-events:none}.cita-info{color:var(--blue);font-size:9px;line-height:1.2;font-family:Poppins,sans-serif;outline:none;min-height:11px}.cita-info:empty:before{content:attr(data-ph);color:#D4C8BC;pointer-events:none}.add-cita-btn{;margin-top:3px;background:none;border:1px dashed #D4C8BC;border-radius:3px;color:#B8A898;font-size:9px;font-family:Poppins,sans-serif;cursor:pointer;padding:2px 4px;text-align:center;width:100%}.add-cita-btn:hover{border-color:var(--orange);color:var(--orange)}.day-cell:hover .add-cita-btn{display:block}.del-cita{position:absolute;top:2px;right:0;background:#EDE8E0;border:none;color:#A89888;font-size:11px;cursor:pointer;padding:0 4px;border-radius:3px;opacity:0;transition:opacity .2s}.cita-block:hover .del-cita{opacity:1}.del-cita:hover{background:#D6470E;color:#fff}#alert-box{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#17110D;color:#fff;padding:12px 20px;border-radius:6px;font-size:14px;z-index:200;;box-shadow:0 4px 12px rgba(0,0,0,.3)}#alert-box.show{display:block;animation:fadeIn .3s}@keyframes fadeIn{from{opacity:0;top:10px}to{opacity:1;top:20px}}@media(max-width:768px){.cal-page{margin:16px;border-radius:8px}.banner{padding:24px 20px 20px}.banner h1{font-size:36px}.banner h1 span{font-size:20px}.grid-head{}.grid-body{grid-template-columns:1fr}.day-cell{min-height:auto;border-right:none;border-bottom:2px solid var(--line);padding:12px}.day-num{font-size:14px;font-weight:700;margin-bottom:8px}.day-num:before{content:'Día ';color:#888}.cita-block{padding:8px;border:1px solid #EDE8E0;border-radius:4px;margin-bottom:4px}.cita-block:first-of-type{border-top:1px solid #EDE8E0;padding-top:8px}.cita-titulo{font-size:11px}.cita-info{font-size:10px}#toolbar{padding:8px 12px;gap:8px}#toolbar button{font-size:11px;padding:6px 12px}#toolbar .hint{font-size:10px}}@media print{#toolbar,#alert-box,.add-cita-btn,.del-cita{!important}body{background:#fff}.cal-page{box-shadow:none;border-radius:0;margin:0;max-width:100%;page-break-after:always}.day-cell{min-height:140px;page-break-inside:avoid}.cita-block{page-break-inside:avoid}.cita-titulo:empty,.cita-info:empty{}.banner{padding:30px 40px 24px}.banner h1{font-size:48px}.cita-titulo{font-size:9px}.cita-info{font-size:8px}}</style></head><body><div id=alert-box></div><div id=toolbar><button onclick="window.print()">🖨️ Imprimir PDF</button><button onclick=exportData()>💾 Exportar Datos</button><button onclick="document.getElementById('importFile').click()">📁 Importar Datos</button><input type=file id=importFile accept=.json style= onchange=importData(this)><span class=hint>Cada día tiene 3 citas. Pasa el cursor y usa + para más (máx 6)</span></div><script>const MONTHS=[{name:'JULIO',year:2026,month:6,days:31},{name:'AGOSTO',year:2026,month:7,days:31},{name:'SEPTIEMBRE',year:2026,month:8,days:30},{name:'OCTUBRE',year:2026,month:9,days:31},{name:'NOVIEMBRE',year:2026,month:10,days:30},{name:'DICIEMBRE',year:2026,month:11,days:31}];const DAYS=['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];const DEF=3;const MAX=6;let storageOk=true;function showAlert(msg,dur=3000){const a=document.getElementById('alert-box');a.textContent=msg;a.className='show';setTimeout(()=>a.className='',dur)}function testStorage(){try{localStorage.setItem('test','1');localStorage.removeItem('test');return true}catch(e){return false}}storageOk=testStorage();if(!storageOk)showAlert('⚠️ Almacenamiento no disponible. Los datos NO se guardarán.',5000);function sv(k,v){if(!storageOk)return;try{localStorage.setItem(k,v)}catch(e){}}function ld(k){if(!storageOk)return '';try{return localStorage.getItem(k)||''}catch(e){return ''}}function svN(k,n){sv(k+'_n',n)}function ldN(k){try{return parseInt(localStorage.getItem(k+'_n')||DEF)}catch(e){return DEF}}function mk(m,d,c,f){return 'cv26_'+m+'_'+d+'_c'+c+'_'+f}function mkCell(m,d){return 'cv26_'+m+'_'+d}function exportData(){if(!storageOk){showAlert('No hay datos para exportar');return}const data={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('cv26_'))data[k]=localStorage.getItem(k)}const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='calendario-visitas-2026.json';a.click();URL.revokeObjectURL(url);showAlert('✅ Datos exportados correctamente')}function importData(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const data=JSON.parse(e.target.result);let count=0;for(const k in data){localStorage.setItem(k,data[k]);count++}showAlert('✅ '+count+' datos importados. Recarga la página (F5).',5000)}catch(err){showAlert('❌ Error: archivo inválido')}};reader.readAsText(file);input.value=''}function delCita(m,d,ci,block){if(!confirm('¿Eliminar esta cita?'))return;const kt=mk(m,d,ci,'t');const ki=mk(m,d,ci,'i');sv(kt,'');sv(ki,'');block.querySelector('.cita-titulo').textContent='';block.querySelector('.cita-info').textContent='';showAlert('🗑️ Cita eliminada')}function makeCita(m,d,ci){const b=document.createElement('div');b.className='cita-block';const n=document.createElement('div');n.className='cita-num';n.textContent=ci+'.';b.appendChild(n);const t=document.createElement('div');t.className='cita-titulo';t.contentEditable='true';t.setAttribute('data-ph','Visita / Actividad');t.setAttribute('spellcheck','false');const kt=mk(m,d,ci,'t');t.textContent=ld(kt);t.addEventListener('input',()=>sv(kt,t.textContent));b.appendChild(t);const i=document.createElement('div');i.className='cita-info';i.contentEditable='true';i.setAttribute('data-ph','Hora | Dirección');i.setAttribute('spellcheck','false');const ki=mk(m,d,ci,'i');i.textContent=ld(ki);i.addEventListener('input',()=>sv(ki,i.textContent));b.appendChild(i);const del=document.createElement('button');del.className='del-cita';del.innerHTML='✕';del.onclick=()=>delCita(m,d,ci,b);b.appendChild(del);return b}function buildMonth(cfg){const first=new Date(cfg.year,cfg.month,1).getDay();const page=document.createElement('div');page.className='cal-page';const ban=document.createElement('div');ban.className='banner';ban.innerHTML='<div class=label>Calendario de Visitas</div><h1>'+cfg.name+' <span>'+cfg.year+'</span></h1>';page.appendChild(ban);const hd=document.createElement('div');hd.className='grid-head';DAYS.forEach(d=>{const div=document.createElement('div');div.textContent=d;hd.appendChild(div)});page.appendChild(hd);const body=document.createElement('div');body.className='grid-body';for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day-cell empty';body.appendChild(e)}for(let d=1;d<=cfg.days;d++){const cell=document.createElement('div');cell.className='day-cell';const dn=document.createElement('div');dn.className='day-num';dn.textContent=d;cell.appendChild(dn);const ck=mkCell(cfg.month,d);const cnt=ldN(ck);for(let c=1;c<=cnt;c++)cell.appendChild(makeCita(cfg.month,d,c));const btn=document.createElement('button');btn.className='add-cita-btn';btn.textContent='+ Agregar cita';btn.onclick=()=>{const cur=cell.querySelectorAll('.cita-block').length;if(cur>=MAX){showAlert('⚠️ Máximo '+MAX+' citas por día');return}const nxt=cur+1;const nb=makeCita(cfg.month,d,nxt);cell.insertBefore(nb,btn);svN(ck,nxt);nb.querySelector('.cita-titulo').focus()};cell.appendChild(btn);body.appendChild(cell)}const tot=first+cfg.days;const rem=tot%7;if(rem!==0)for(let i=0;i<(7-rem);i++){const e=document.createElement('div');e.className='day-cell empty';body.appendChild(e)}page.appendChild(body);document.body.appendChild(page)}MONTHS.forEach(buildMonth)</script></body></html>
